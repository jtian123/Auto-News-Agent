name: Weekly Digest

on:
  schedule:
    - cron: "0 15 * * 1"  # Mondays at 15:00 UTC
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          auto-news-agent --campus usc_la --print
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: weekly-outputs
          path: |
            outputs/*.json
            outputs/*.txt
            poster_briefs/*.json
